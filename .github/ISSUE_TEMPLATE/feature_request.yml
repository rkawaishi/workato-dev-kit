name: Feature Request
description: Propose a new feature or improvement
title: "[enhancement] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Proposals for new skills, rules, or connector docs are welcome.
        If you want to discuss first, consider [Discussions](https://github.com/rkawaishi/workato-dev-kit/discussions).

  - type: textarea
    id: motivation
    attributes:
      label: Motivation / Why
      description: The problem you want to solve, current pain point, or use case.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal / What
      description: How you want to change it. A sketch of the API, skill name, or file layout helps the discussion.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: Other approaches you considered and why you did not pick them.
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Which area is affected?
      multiple: true
      options:
        - Skills (framework/claude/skills/)
        - Rules (framework/claude/rules/)
        - Knowledge base (docs/)
        - Build / sync scripts (scripts/)
        - Setup (setup.sh)
        - Documentation (guides/, README)
        - CI / GitHub
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Related issues, references, diagrams, etc.
    validations:
      required: false
