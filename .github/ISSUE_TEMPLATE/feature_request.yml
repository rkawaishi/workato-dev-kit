name: 機能要望 / Feature Request
description: 新機能・改善の提案
title: "[enhancement] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        新しいスキル・ルール・コネクタドキュメントの提案などを歓迎します。
        まず議論したい場合は [Discussions](https://github.com/rkawaishi/workato-dev-kit/discussions) も検討してください。

  - type: textarea
    id: motivation
    attributes:
      label: 動機 / Why
      description: 解決したい問題、現状の不便さ、ユースケース
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 提案 / What
      description: どう変えたいか。具体的な API・スキル名・ファイル構成のスケッチがあると話が進めやすいです。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 代替案
      description: 検討した他のアプローチと、それを選ばなかった理由
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: スコープ
      description: どの領域の変更ですか？
      multiple: true
      options:
        - スキル (framework/claude/skills/)
        - ルール (framework/claude/rules/)
        - ナレッジベース (docs/)
        - ビルド/同期スクリプト (scripts/)
        - セットアップ (setup.sh)
        - ドキュメント (guides/, README)
        - CI / GitHub 関連
        - その他
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: その他補足
      description: 関連 issue、参考リンク、図など
    validations:
      required: false
