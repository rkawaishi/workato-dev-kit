name: Bug Report
description: Report a bug in workato-dev-kit
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report.
        For security vulnerabilities, please follow the private reporting flow in [SECURITY.md](https://github.com/rkawaishi/workato-dev-kit/blob/main/SECURITY.md) instead of opening a public issue.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Briefly describe what is happening.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Provide the minimal sequence to reproduce.
      placeholder: |
        1. Run `bash kit/setup.sh`
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Paste any error messages or logs. Use a code block for long output.
    validations:
      required: true

  - type: dropdown
    id: editor
    attributes:
      label: Editor
      description: Which editor reproduces the issue?
      multiple: true
      options:
        - Claude Code
        - Cursor
        - Codex CLI
        - Gemini CLI
        - Other / not applicable
    validations:
      required: true

  - type: input
    id: kit-version
    attributes:
      label: Kit version
      description: "Output of `git -C kit rev-parse HEAD` (commit hash) or the date you pulled the submodule."
      placeholder: "e.g. 20021ee or pulled 2026-05-10"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS / environment
      placeholder: "e.g. macOS 14.5 (arm64), Ubuntu 22.04, Windows 11 + WSL2"
    validations:
      required: true

  - type: input
    id: workato-cli-version
    attributes:
      label: Workato Platform CLI version
      description: "Output of `workato --version` (only if the bug involves the CLI)."
      placeholder: "e.g. workato-platform-cli 0.5.x"
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, related issues, workarounds, etc.
    validations:
      required: false
