name: Connector Doc Update
description: Propose adding or correcting docs/connectors/<provider>.md
title: "[docs] connector: "
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template to propose new or corrected docs for Workato connectors — field metadata, trigger/action details, etc.
        Pair it with a PR contributing the findings you collected via `/learn-recipe` or `/auto-learn`.

  - type: input
    id: provider
    attributes:
      label: Connector name (provider)
      description: "Must match the file name of docs/connectors/<provider>.md."
      placeholder: "e.g. salesforce, google_sheets, slack"
    validations:
      required: true

  - type: dropdown
    id: connector-type
    attributes:
      label: Connector type
      options:
        - Pre-built (Workato official)
        - Custom (Connector SDK)
        - Unknown / not applicable
    validations:
      required: true

  - type: dropdown
    id: change-type
    attributes:
      label: Change type
      multiple: true
      options:
        - Add a new connector
        - Add a trigger / action
        - Correct an existing field
        - Add or improve descriptions
        - Fix incorrect information
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: What you want to add or correct
      description: |
        Be specific about which trigger/action and which fields you want to add or correct.
        Where possible, include the input field schema (type, required, options, etc.).
    validations:
      required: true

  - type: textarea
    id: source
    attributes:
      label: Source
      description: |
        Evidence for the change, for example:
        - URL of the Workato official docs
        - What you observed in your own recipe JSON
        - Output of `/learn-recipe`
        - Output of `/auto-learn`
    validations:
      required: false

  - type: dropdown
    id: pr-intent
    attributes:
      label: PR intent
      options:
        - I plan to submit the PR myself
        - Proposal only (maintainer can pick this up)
        - Undecided
    validations:
      required: true
