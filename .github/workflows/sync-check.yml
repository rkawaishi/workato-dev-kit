name: sync-check

# Verify that framework/{cursor,codex,gemini}/ and framework/AGENTS.md
# (all generated by scripts/sync_agents.py) have not drifted from the
# canonical framework/claude/ source.
#
# Catches PRs that edit framework/claude/ but forget to re-run
# sync_agents.py.

on:
  pull_request:
    paths:
      - 'framework/claude/**'
      - 'framework/cursor/**'
      - 'framework/codex/**'
      - 'framework/gemini/**'
      - 'framework/AGENTS.md'
      - 'scripts/sync_agents.py'
      - '.github/workflows/sync-check.yml'
  push:
    branches: [main]

jobs:
  sync-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run sync_agents.py
        run: python3 scripts/sync_agents.py

      - name: Detect drift
        run: |
          # `git diff` alone only catches changes to tracked files. It
          # would miss the case where sync produced new untracked files
          # for a newly added skill (e.g. framework/cursor/skills/
          # <new-skill>/SKILL.md). `git status --porcelain` checks both
          # tracked and untracked state.
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::framework/{cursor,codex,gemini}/ or framework/AGENTS.md is out of sync with framework/claude/."
            echo "::error::Run 'python3 scripts/sync_agents.py' locally and commit the regenerated files."
            echo ""
            echo "Drift detected (modified or untracked):"
            git status --short
            echo ""
            echo "--- Diff of tracked changes ---"
            git diff
            exit 1
          fi

      - name: Check AGENTS.md size budget
        run: |
          # AGENTS.md flat-concatenates CLAUDE.md + every rule, so it
          # grows linearly each time a rule is added. Codex / Aider and
          # other flat-loading agents pull the full file into context on
          # every turn, which translates directly to user token costs.
          #
          # Assume +200~400 lines per new rule and leave ~12% headroom
          # above the current size. When the budget is exceeded, choose
          # one of:
          #   1) Consolidate rules to shrink the total
          #   2) Redesign AGENTS.md as an index (issue #102)
          #   3) Discuss and raise the limit in this file
          MAX_LINES=1500
          MAX_BYTES=65000
          lines=$(wc -l < framework/AGENTS.md)
          bytes=$(wc -c < framework/AGENTS.md)
          echo "framework/AGENTS.md: $lines lines, $bytes bytes (budget: $MAX_LINES lines, $MAX_BYTES bytes)"
          if [ "$lines" -gt "$MAX_LINES" ] || [ "$bytes" -gt "$MAX_BYTES" ]; then
            echo "::error::framework/AGENTS.md exceeds the size budget."
            echo "::error::Lines: $lines / $MAX_LINES, Bytes: $bytes / $MAX_BYTES"
            echo "::error::See issue #102 for refactor options (index-based structure, rule consolidation)."
            exit 1
          fi
