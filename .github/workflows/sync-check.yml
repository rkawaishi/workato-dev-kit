name: sync-check

# scripts/sync_agents.py が生成する framework/{cursor,codex,gemini}/ と
# framework/AGENTS.md が、framework/claude/ の正本とドリフトしていないか検証する。
#
# framework/claude/ を編集したのに sync_agents.py を回し忘れた PR を検出する。

on:
  pull_request:
    paths:
      - 'framework/claude/**'
      - 'framework/cursor/**'
      - 'framework/codex/**'
      - 'framework/gemini/**'
      - 'framework/AGENTS.md'
      - 'scripts/sync_agents.py'
      - '.github/workflows/sync-check.yml'
  push:
    branches: [main]

jobs:
  sync-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run sync_agents.py
        run: python3 scripts/sync_agents.py

      - name: Detect drift
        run: |
          # `git diff` だけでは tracked ファイルの変更しか検出できず、
          # 新規スキル追加で sync が untracked ファイルを生成したケース
          # （例: framework/cursor/skills/<new-skill>/SKILL.md）を見落とす。
          # `git status --porcelain` で tracked / untracked 両方を検査する。
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::framework/{cursor,codex,gemini}/ or framework/AGENTS.md is out of sync with framework/claude/."
            echo "::error::Run 'python3 scripts/sync_agents.py' locally and commit the regenerated files."
            echo ""
            echo "Drift detected (modified or untracked):"
            git status --short
            echo ""
            echo "--- Diff of tracked changes ---"
            git diff
            exit 1
          fi
