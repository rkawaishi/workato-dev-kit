name: tests

# Runs every Python test under scripts/tests/. Tests are stdlib-only and
# importlib-based, so no requirements.txt or test runner setup is needed.

on:
  pull_request:
    paths:
      - 'scripts/**'
      - '.github/workflows/tests.yml'
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - '.github/workflows/tests.yml'

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run tests
        run: |
          set -e
          fail=0
          for t in scripts/tests/test_*.py; do
            echo "=== $t ==="
            python3 "$t" || fail=1
          done
          exit $fail
